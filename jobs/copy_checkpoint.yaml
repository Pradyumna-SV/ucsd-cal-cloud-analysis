apiVersion: v1
kind: Pod
metadata:
  name: prad-copy-checkpoint
  namespace: climate-analytics
spec:
  restartPolicy: Never
  containers:
  - name: copy
    image: alpine:3.19
    command: ["sleep", "3600"]   # stays alive for 1 hour so you can kubectl cp into it
    resources:
      limits:
        cpu: "1"
        memory: "512Mi"
      requests:
        cpu: "1"
        memory: "512Mi"
    volumeMounts:
    - name: embeddings-storage
      mountPath: /workspace

  volumes:
  - name: embeddings-storage
    persistentVolumeClaim:
      claimName: prad-embeddings-5ti

  tolerations:
    - key: "nautilus.io/noceph"
      operator: Exists
      effect: NoSchedule
    - key: "nautilus.io/group"
      operator: Exists
      effect: NoSchedule
    - key: "kubernetes.io/arch"
      value: "amd64"
      operator: Equal
      effect: NoSchedule
